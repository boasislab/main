    opts: ["기업이 탄소를 배출할 때마다 정부에 벌금을 내는 제도", "탄소를 많이 쓴 수입 제품에 부과하는 관세 제도", "온실가스 배출 허용량(배출권)을 기업 간 사고팔 수 있는 제도", "탄소 포집 기술을 개발한 기업에 보조금을 지원하는 제도"],
    ans: 2,
    exp: "배출권 거래제: 온실가스 배출 허용량을 기업 간 거래 가능. 감축 기술 개발 기업이 잉여 배출권 판매 가능. 탄소국경세와 다른 제도."
  },
  {
    q: "환경교육의 3단계를 올바른 순서로 나열한 것은?",
    opts: ["발(행동) → 머리(지식) → 가슴(감수성)", "머리(지식) → 가슴(감수성) → 발(행동)", "가슴(감수성) → 발(행동) → 머리(지식)", "발(행동) → 가슴(감수성) → 머리(지식)"],
    ans: 1,
    exp: "환경교육 3단계: ① 머리(지식) — 환경 현상과 원리 이해 ② 가슴(감수성) — 생태 감수성 키우기 ③ 발(행동) — 실천으로 연결."
  },
  {
    q: "에너지 절약을 위한 여름 실내 냉방 적정 온도는?",
    opts: ["18도 이상", "22도 이상", "24도 이상", "26도 이상"],
    ans: 3,
    exp: "여름 실내 냉방은 26도 이상(습도 60% 이상 시 에어컨 가동). 겨울 난방은 20~22도. 극단적 냉난방은 더 많은 에너지→더 뜨거운 지구의 악순환."
  }
];

let correctCount = 0;
const answered = new Array(QS.length).fill(false);

function render() {
  const container = document.getElementById('quiz');
  container.innerHTML = '';
  QS.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'card-' + i;

    const num = document.createElement('div');
    num.className = 'q-num';
    num.textContent = `문제 ${i + 1}`;
    card.appendChild(num);

    const qt = document.createElement('div');
    qt.className = 'q-text';
    qt.textContent = q.q;
    card.appendChild(qt);

    const opts = document.createElement('div');
    opts.className = 'options';
    q.opts.forEach((opt, j) => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = `${['①','②','③','④'][j]} ${opt}`;
      btn.onclick = () => answer(i, j, btn, opts);
      opts.appendChild(btn);
    });
    card.appendChild(opts);

    const exp = document.createElement('div');
    exp.className = 'explanation';
    exp.id = 'exp-' + i;
    exp.textContent = '📌 ' + q.exp;
    card.appendChild(exp);

    container.appendChild(card);
  });
  updateScore();
}

function answer(qi, selected, btn, opts) {
  if (answered[qi]) return;
  answered[qi] = true;

  const correct = QS[qi].ans;
  const allBtns = opts.querySelectorAll('.opt-btn');
  allBtns.forEach(b => b.disabled = true);

  const card = document.getElementById('card-' + qi);
  const exp = document.getElementById('exp-' + qi);

  if (selected === correct) {
    btn.classList.add('selected-correct');
    card.classList.add('correct-card');
    correctCount++;
  } else {
    btn.classList.add('selected-wrong');
    allBtns[correct].classList.add('show-answer');
    card.classList.add('wrong-card');
  }
  exp.classList.add('visible');
  updateScore();
}

function updateScore() {
  const done = answered.filter(Boolean).length;
  document.getElementById('score').textContent = `${correctCount} / ${QS.length}`;
}

function resetAll() {
  correctCount = 0;
  answered.fill(false);
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

render();
</script>
